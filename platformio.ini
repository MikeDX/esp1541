; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp1541-s3

[env]
platform = espressif32 @ 6.4.0
framework = arduino
board_build.filesystem = littlefs
; 1.2.x from the registry can end up with a broken/corrupt unpack (missing WebHandlerImpl.h).
; Use maintained 3.x (pulls ESP32Async/AsyncTCP); do not mix with me-no-dev/AsyncTCP 1.x.
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^3.6.0
upload_speed = 921600
monitor_speed = 921600

[env:esp1541]
board = esp-wrover-kit
build_src_filter = 
	+<*>
	-<1541/>
	-<main_esp1541.cpp>
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D CORE_DEBUG_LEVEL=3
	-D BOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue

[env:esp1541-s3]
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
build_src_filter = 
	+<*>
build_flags = 
	-D ARDUINO_USB_CDC_ON_BOOT=0
	-D CORE_DEBUG_LEVEL=3
	-D BOARD_HAS_PSRAM
	-D __ESP32__
	-D EXPERIMENTALZERO
	-D USE_PI1541_EMU=1
	-I include
custom_sdkconfig = CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=y
lib_deps = me-no-dev/ESPAsyncWebServer@3.6.0
