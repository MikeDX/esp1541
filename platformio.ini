; ESP1541 - Pi1541-style 1541 emulation on ESP32 (in progress)
; Web disk loader works today; full Pi1541 + IEC is built only when 1541/ is included
; (needs enough RAM — prefer ESP32-S3 + PSRAM for full firmware).
;
; Build:  pio run
; Upload: pio run -t upload
;         pio run -e esp1541-s3 -t upload

[platformio]
default_envs = esp1541

; Shared library deps
[env]
platform = espressif32 @ 6.4.0
framework = arduino
board_build.filesystem = littlefs
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
; Web-only firmware: Pi1541 sources are large; classic ESP32 DRAM is tight for full link
build_src_filter =
    +<*>
    -<1541/>
    -<main_esp1541.cpp>
upload_speed = 921600
monitor_speed = 921600

[env:esp1541]
board = esp-wrover-kit
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; ESP32-S3 + PSRAM (e.g. DevKitC-1 with N8R2 / N16R8). More internal RAM + faster OPI PSRAM
; than classic ESP32 — better target for enabling src/1541/ + IEC when we flip the src filter.
[env:esp1541-s3]
board = esp32-s3-devkitc-1
; Most S3 DevKit modules with PSRAM use octal (OPI); if upload/boot fails, try commenting this
; or use a board JSON that matches your flash/psram wiring (qio_qspi vs qio_opi).
board_build.arduino.memory_type = qio_opi
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
