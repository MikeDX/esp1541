; ESP1541 - Pi1541-style 1541 emulation on ESP32 (in progress)
; Web disk loader works today; full Pi1541 + IEC is built only when 1541/ is included
; (needs enough RAM — prefer ESP32-S3 + PSRAM for full firmware).
;
; Build:  pio run
; Upload: pio run -t upload
;         pio run -e esp1541-s3 -t upload

[platformio]
; Full 1541 emulation targets ESP32-S3 + PSRAM (see README)
default_envs = esp1541-s3

; Shared library deps
[env]
platform = espressif32 @ 6.4.0
framework = arduino
board_build.filesystem = littlefs
lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    me-no-dev/AsyncTCP @ ^1.1.1
upload_speed = 921600
monitor_speed = 921600

; Web-only: classic ESP32 cannot link full Pi1541 (DRAM overflow)
[env:esp1541]
board = esp-wrover-kit
build_src_filter =
    +<*>
    -<1541/>
    -<main_esp1541.cpp>
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

; Full Pi1541 IEC emulation + WiFi AP (upload 16KB ROM + D64/G64 before C64 use)
[env:esp1541-s3]
; N8R8 = 8MB flash + 8MB OPI PSRAM (not the default DevKitC-1 "no PSRAM" variant)
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
build_src_filter =
    +<*>
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D CORE_DEBUG_LEVEL=3
    -D BOARD_HAS_PSRAM
    -D __ESP32__
    -D EXPERIMENTALZERO
    -D USE_PI1541_EMU=1
    -I include
; Large .bss (roms, IEC_Commands, …) → external SPIRAM when supported by Arduino-IDF merge
custom_sdkconfig = CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY=y
